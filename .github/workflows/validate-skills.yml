name: Validate skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate collection
        run: python3 scripts/validate_collection.py
      - name: Test research orchestrator
        working-directory: skills/orchestration/security-research-orchestrator
        run: python3 -m unittest discover -s tests -p "test_*.py" -v
      - name: Test research template compiler
        working-directory: skills/research-design/research-template-compiler
        run: python3 -m unittest discover -s tests -p "test_*.py" -v
